<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord — Admin</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-nav { background: var(--bleu); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .admin-nav .logo { color: var(--or); font-weight: 700; }
    .admin-nav a { color: #ccc; text-decoration: none; margin-left: 1.5rem; font-size: .9rem; }
    .admin-nav a:hover { color: var(--or); }
    .admin-wrap { max-width: 1100px; margin: 2rem auto; padding: 0 2rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: #fff; border-radius: 12px; box-shadow: var(--shadow); padding: 1.5rem; }
    .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--or-dark); }
    .stat-card .label { color: #888; font-size: .9rem; margin-top: .3rem; }
    .actions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
    .action-card { background: #fff; border-radius: 12px; box-shadow: var(--shadow); padding: 2rem; text-decoration: none; color: var(--bleu); transition: transform .2s; }
    .action-card:hover { transform: translateY(-4px); }
    .action-card h3 { color: var(--bleu); margin-bottom: .5rem; }
    .action-card p { color: #888; font-size: .9rem; }
  </style>
</head>
<body style="background:#f5f5f5">

<div class="admin-nav">
  <span class="logo" style="display:flex;align-items:center;gap:10px"><img src="/img/logo-jouve.svg" alt="Jouve" style="height:40px;width:auto;background:#fff;border-radius:50%;padding:2px"> Admin</span>
  <div>
    <a href="/admin/dashboard.html">Tableau de bord</a>
    <a href="/admin/produits.html">Produits</a>
    <a href="/admin/commandes.html">Commandes</a>
    <a href="/" target="_blank">Voir le site</a>
    <a href="#" onclick="logout()">Déconnexion</a>
  </div>
</div>

<div class="admin-wrap">
  <h1 style="color:var(--bleu);margin-bottom:1.5rem">Tableau de bord</h1>

  <div class="stats-grid">
    <div class="stat-card"><div class="num" id="stat-produits">—</div><div class="label">Produits actifs</div></div>
    <div class="stat-card"><div class="num" id="stat-commandes">—</div><div class="label">Commandes totales</div></div>
    <div class="stat-card"><div class="num" id="stat-cachets">—</div><div class="label">Cachets à traiter (BAT)</div></div>
  </div>

  <div class="actions-grid">
    <a href="/admin/produits.html" class="action-card">
      <h3>📦 Gérer les produits</h3>
      <p>Ajouter, modifier, mettre à jour les prix et le stock</p>
    </a>
    <a href="/admin/commandes.html" class="action-card">
      <h3>🛒 Voir les commandes</h3>
      <p>Suivre et traiter les commandes clients</p>
    </a>
  </div>
</div>

<script>
async function loadStats() {
  try {
    const prod = await fetch('/api/products').then(r => r.json());
    document.getElementById('stat-produits').textContent = prod.length;
  } catch(e) {}

  try {
    const cmd = await fetch('/api/orders').then(r => r.json());
    if (Array.isArray(cmd)) document.getElementById('stat-commandes').textContent = cmd.length;
  } catch(e) {}

  try {
    const cachets = await fetch('/api/configurateur/orders').then(r => r.json());
    if (Array.isArray(cachets)) {
      const enAttente = cachets.filter(c => c.statut_bat === 'en_attente').length;
      document.getElementById('stat-cachets').textContent = enAttente;
    }
  } catch(e) {}
}

async function logout() {
  await fetch('/api/admin/logout', { method: 'POST' });
  window.location = '/admin/login.html';
}

loadStats();
</script>
</body>
</html>
